<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark-theme">
  <div class="calculator">
    <div class="top-bar">
      <div id="clock" class="clock">00:00:00 AM</div>
      <button id="themeToggle">🌙</button>
    </div>

    <input type="text" id="display" placeholder="Expression" readonly />
    <input type="text" id="answer" placeholder="Answer" readonly />
    <button id="copyBtn">Copy Result</button>

    <div class="solve-quadratic">
      <button onclick="openModal()">Solve Quadratic</button>
      <input type="text" id="resultDisplay" disabled placeholder="Quadratic result" />
    </div>

    <div class="sci-grid">
      <button onclick="input('Math.sin(')">sin</button>
      <button onclick="input('Math.cos(')">cos</button>
      <button onclick="input('Math.tan(')">tan</button>
      <button onclick="input('Math.log(')">log</button>

      <button onclick="input('Math.sqrt(')">√</button>
      <button onclick="input('**')">^</button>
      <button onclick="input('Math.PI')">π</button>
      <button onclick="input('Math.E')">e</button>
      <button onclick="input('Math.log(')">ln</button>
      <button onclick="input(')')">)</button>
    </div>

    <div class="button-grid">
      <button onclick="input(1)">1</button>
      <button onclick="input(2)">2</button>
      <button onclick="input(3)">3</button>
      <button onclick="input('+')">+</button>

      <button onclick="input(4)">4</button>
      <button onclick="input(5)">5</button>
      <button onclick="input(6)">6</button>
      <button onclick="input('-')">-</button>

      <button onclick="input(7)">7</button>
      <button onclick="input(8)">8</button>
      <button onclick="input(9)">9</button>
      <button onclick="input('*')">*</button>

      <button onclick="input(0)">0</button>
      <button onclick="input('.')">.</button>
      <button onclick="deleteLast()">Del</button>
      <button onclick="input('/')">/</button>

      <button onclick="clearDisplay()">AC</button>
      <button onclick="displayanswer()">=</button>
    </div>
  </div>

  <!-- Modal for Quadratic Solver -->
  <div id="quadraticModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h3>Solve Quadratic: ax² + bx + c = 0</h3>
      <input type="number" id="a" placeholder="Enter a" />
      <input type="number" id="b" placeholder="Enter b" />
      <input type="number" id="c" placeholder="Enter c" />
      <button onclick="solveQuadratic()">Solve</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
